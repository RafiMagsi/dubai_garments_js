services:
  storefront:
    build:
      context: ./apps/storefront-dubai_garments
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/storefront-dubai_garments:/app
      - storefront_node_modules:/app/node_modules
      - storefront_next:/app/.next
    command: sh -c "npm run prisma:generate && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development

volumes:
  storefront_node_modules:
  storefront_next:
