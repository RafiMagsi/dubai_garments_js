name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Deployment mode"
        required: true
        default: "docker"
        type: choice
        options:
          - docker
          - systemd
      deploy_ref:
        description: "Git ref to deploy"
        required: true
        default: "main"
        type: string
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    env:
      DEPLOY_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode || 'docker' }}
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_ref || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload project files to server
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p '${{ secrets.DEPLOY_PATH }}'"
          rsync -az --delete --itemize-changes --human-readable --info=NAME,STATS2 \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            --filter "P apps/apps/" \
            --filter "P apps/storefront-dubai_garments/apps/" \
            --filter "P apps/storefront-dubai_garments/*.sql" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "**/node_modules/" \
            --exclude "**/.next/" \
            --exclude "**/.venv/" \
            --exclude "**/__pycache__/" \
            --exclude "**/.env.local" \
            --exclude "**/.env.*.local" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Check server and docker status
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "Server: $(hostname)"
            echo "Deploy ref: ${{ env.DEPLOY_REF }}"
            docker --version
            docker compose version
            docker info >/dev/null
            df -h .

      - name: Run deployment on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 60m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            chmod +x scripts/*.sh || true
            chmod +x apps/storefront-dubai_garments/scripts/*.sh || true
            SKIP_GIT_SYNC=true ./scripts/github-deploy.sh "${{ env.DEPLOY_MODE }}" "${{ env.DEPLOY_REF }}"
